<main>
    <section class="signup pt-20 pb-20 gray-bg login">
        <div class="container">
            <div class="col-md-8 offset-md-2">
                <div class="signup-content login-form">
                    <form action="#" id="signup-form" class="signup-form">
                        <h2 class="form-title pb-20">Đăng nhập</h2>
                        <div class="form-group">
                            <input type="text" class="form-input" name="Username" id="username"
                                placeholder="Tên đăng nhập" />
                        </div>
                        <div class="form-group">
                            <input type="text" class="form-input" name="Password" id="password"
                                placeholder="Mật khẩu" />
                        </div>
                        <div class="form-group">
                            <input type="submit" name="submit" id="submit" class="main-btn register-submit"
                                value="Đăng nhập" />
                        </div>
                    </form>
                    <p class="loginhere">
                        Bạn chưa có tài khoản ? <a href="./?page=login&s=register" class="loginhere-link">Đăng ký</a>
                    </p>
                </div>
            </div>
        </div>
    </section>

    <section class="signup pt-20 pb-20 gray-bg register">
        <div class="container">
            <div class="col-md-8 offset-md-2">
                <div class="signup-content register-form">
                    <form action="#" id="signup-form" class="signup-form">
                        <h2 class="form-title pb-20">Tạo tài khoản</h2>
                        <div class="form-group">
                            <input type="text" class="form-input" name="Name" id="name" placeholder="Tên của bạn" />
                        </div>
                        <div class="form-group">
                            <input type="text" class="form-input" name="Username" id="username"
                                placeholder="Tên đăng nhập" />
                        </div>
                        <div class="form-group">
                            <input type="text" class="form-input" name="Password" id="password"
                                placeholder="Mật khẩu" />
                        </div>
                        <div class="form-group">
                            <input type="submit" name="submit" id="submit" class="main-btn register-submit"
                                value="Đăng ký" />
                        </div>
                    </form>
                    <p class="loginhere">
                        Đã có tài khoản ? <a href="./?page=login" class="loginhere-link">Đăng nhập</a>
                    </p>
                </div>
            </div>
        </div>
    </section>
</main>
